name: Build Multi-Arch rffmpeg-worker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: ghcr.io/wontdoanything/rffmpeg-worker:${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          provenance: false

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run:
          # docker buildx imagetools create \
          #   --tag ghcr.io/wontdoanything/rffmpeg-worker:latest \
          #   ghcr.io/wontdoanything/rffmpeg-worker:amd64 \
          #   ghcr.io/wontdoanything/rffmpeg-worker:arm64
          docker buildx build --platform linux/amd64,linux/arm64 -t ghcr.io/wontdoanything/rffmpeg-worker:latest --push .
